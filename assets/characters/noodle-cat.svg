<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="A golden cat in an egg-yolk collar serving noodles">
  <defs>
    <linearGradient id="catGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9D86B"/>
      <stop offset="1" stop-color="#E7A84B"/>
    </linearGradient>
    <linearGradient id="apron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF8E9"/>
      <stop offset="1" stop-color="#F4E4C8"/>
    </linearGradient>
    <filter id="stickerShadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#663C2A" flood-opacity=".2"/>
    </filter>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="2" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="softNoise"><feFuncA type="table" tableValues="0 .07"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
  </defs>
  <g filter="url(#stickerShadow)">
    <!-- cream sticker border -->
    <path d="M118 58 91 25 78 82C44 112 42 173 61 207c-14 25-16 54-5 82-23 17-31 48-19 73 12 26 39 36 63 29 1 41 25 78 64 92 29 10 57 4 76-13 22 17 53 21 81 9 37-16 58-53 56-92 27 8 56-7 66-34 9-25-1-52-23-68 8-27 4-54-9-77 20-42 14-100-19-130l-9-52-31 28c-50-22-112-21-158 4Z" fill="#FFF8E9" stroke="#FFF8E9" stroke-width="31" stroke-linejoin="round"/>
    <g filter="url(#paper)" stroke="#663C2A" stroke-linecap="round" stroke-linejoin="round">
      <!-- tail and body -->
      <path d="M368 307c68-11 83 62 43 78-21 9-42-1-48-17" fill="none" stroke-width="17"/>
      <path d="M131 292c-21 39-23 100-4 142 16 36 55 55 89 31 12-9 19-23 21-40 5 21 19 39 42 42 39 5 69-28 73-67 3-34-4-73-19-103Z" fill="url(#catGold)" stroke-width="10"/>
      <!-- ears and head -->
      <path d="m151 90-54-44 9 77M348 91l48-43-3 78" fill="#E8A64D" stroke-width="11"/>
      <path d="m130 91-21-20 4 42M365 91l19-19-1 41" fill="#F5B8C1" stroke-width="7"/>
      <path d="M99 139c10-64 71-96 148-96 81 0 145 33 153 102 9 78-44 125-151 126-102 0-162-46-150-132Z" fill="url(#catGold)" stroke-width="11"/>
      <!-- forehead stripes -->
      <path d="m219 66 7 27m25-31-1 31m27-24-8 25" fill="none" stroke-width="7" opacity=".65"/>
      <!-- eyes -->
      <ellipse cx="177" cy="145" rx="35" ry="42" fill="#FFF8E9" stroke-width="8"/>
      <ellipse cx="321" cy="145" rx="35" ry="42" fill="#FFF8E9" stroke-width="8"/>
      <ellipse cx="182" cy="151" rx="20" ry="27" fill="#83A95C" stroke-width="6"/>
      <ellipse cx="316" cy="151" rx="20" ry="27" fill="#83A95C" stroke-width="6"/>
      <ellipse cx="187" cy="156" rx="10" ry="17" fill="#663C2A" stroke="none"/>
      <ellipse cx="311" cy="156" rx="10" ry="17" fill="#663C2A" stroke="none"/>
      <circle cx="191" cy="145" r="5" fill="#FFF8E9" stroke="none"/>
      <circle cx="315" cy="145" r="5" fill="#FFF8E9" stroke="none"/>
      <!-- muzzle -->
      <ellipse cx="214" cy="203" rx="39" ry="28" fill="#FFF3D2" stroke="none"/>
      <ellipse cx="284" cy="203" rx="39" ry="28" fill="#FFF3D2" stroke="none"/>
      <path d="m249 192-12 8 12 9 12-9Z" fill="#E85D4A" stroke-width="5"/>
      <path d="M249 208c-2 18-25 22-31 8m31-8c2 18 25 22 31 8" fill="none" stroke-width="6"/>
      <path d="M161 204 101 192m61 30-65 7m240-25 60-13m-60 31 64 8" fill="none" stroke-width="5"/>
      <!-- fried-egg flower collar -->
      <g stroke-width="7">
        <ellipse cx="162" cy="266" rx="42" ry="27" fill="#FFF8E9" transform="rotate(23 162 266)"/>
        <ellipse cx="199" cy="284" rx="42" ry="27" fill="#FFF8E9" transform="rotate(54 199 284)"/>
        <ellipse cx="249" cy="288" rx="42" ry="27" fill="#FFF8E9" transform="rotate(90 249 288)"/>
        <ellipse cx="299" cy="284" rx="42" ry="27" fill="#FFF8E9" transform="rotate(126 299 284)"/>
        <ellipse cx="336" cy="266" rx="42" ry="27" fill="#FFF8E9" transform="rotate(157 336 266)"/>
        <circle cx="249" cy="264" r="41" fill="#F5C84C"/>
        <path d="M231 252c9-11 27-13 39-2" fill="none" stroke="#FFF1A7" stroke-width="7"/>
      </g>
      <!-- apron -->
      <path d="M176 302c13-17 31-27 51-28h44c20 1 38 11 51 28l13 134c-45 25-126 26-172 0Z" fill="url(#apron)" stroke-width="9"/>
      <path d="M185 354c36 15 92 15 128 0v74c-34 18-94 18-128 0Z" fill="#F5B8C1" stroke-width="7"/>
      <path d="M213 371c22 8 50 8 72 0" fill="none" stroke-width="6"/>
      <!-- arms holding bowl -->
      <path d="M162 334c-42 10-54 42-33 62 14 13 34 6 52-7" fill="url(#catGold)" stroke-width="10"/>
      <path d="M336 334c42 10 54 42 33 62-14 13-34 6-52-7" fill="url(#catGold)" stroke-width="10"/>
      <circle cx="169" cy="383" r="16" fill="#F9D86B" stroke-width="7"/>
      <circle cx="329" cy="383" r="16" fill="#F9D86B" stroke-width="7"/>
      <!-- noodle bowl -->
      <path d="M133 350c27-14 205-14 232 0l-17 65c-42 34-156 34-198 0Z" fill="#E85D4A" stroke-width="10"/>
      <ellipse cx="249" cy="350" rx="116" ry="31" fill="#FFF8E9" stroke-width="10"/>
      <path d="M160 348c20-21 39 18 59-4s38 18 59-3 40 15 60 1" fill="none" stroke="#F5C84C" stroke-width="10"/>
      <path d="M166 354c18-15 34 15 52-1s35 14 53-2 36 13 55-2" fill="none" stroke="#C8792C" stroke-width="8"/>
      <circle cx="201" cy="337" r="7" fill="#83A95C" stroke="none"/>
      <circle cx="291" cy="338" r="7" fill="#83A95C" stroke="none"/>
      <path d="M201 421c29 8 68 8 96 0" fill="none" stroke="#F5B8C1" stroke-width="7"/>
      <!-- paws and apron hem -->
      <path d="M159 446c8 11 20 15 31 13m149-13c-8 11-20 15-31 13" fill="none" stroke-width="6"/>
    </g>
  </g>
</svg>
